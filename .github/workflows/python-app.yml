name: Python Script Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run script
      run: python day1.py "Привет, это проверка из пайплайна!"

    - name: Upload memory JSON
      uses: actions/upload-artifact@v4
      with:
        name: project-memory
        path: memory.json
